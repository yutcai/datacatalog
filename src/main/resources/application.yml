server:
  port: 8083

spring:
  application:
    name: datacatalog
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:datacatalog}
    username: ${DB_USER:datacatalog}
    password: ${DB_PASSWORD:datacatalog}
  jpa:
    hibernate:
      # Liquibase owns the schema; Hibernate only checks that entities match it
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

management:
  endpoints:
    web:
      # Serve actuator endpoints from the root so the health check is GET /health.
      # Only `health` is exposed; the API itself lives under /v1/** so there is no collision.
      base-path: /
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
