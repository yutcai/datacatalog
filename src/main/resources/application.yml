server:
  port: 8083

spring:
  application:
    name: datacatalog
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:datacatalog}
    username: ${DB_USER:datacatalog}
    password: ${DB_PASSWORD:datacatalog}
  jpa:
    hibernate:
      # Liquibase owns the schema; Hibernate only checks that entities match it
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

app:
  s3:
    bucket: ${S3_BUCKET:datacatalog}
    region: ${AWS_REGION:us-east-1}
    # endpoint set for LocalStack/local dev; blank => real AWS (default credential chain)
    endpoint: ${S3_ENDPOINT:}
    # the host the client must reach for pre-signed URLs; defaults to `endpoint` when unset
    public-endpoint: ${S3_PUBLIC_ENDPOINT:}
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}

management:
  endpoints:
    web:
      # Serve actuator endpoints from the root so the health check is GET /health.
      # Only `health` is exposed; the API itself lives under /v1/** so there is no collision.
      base-path: /
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
