server {
    listen 80;
    server_name _;

    # API and health: reverse-proxy to the Spring app over the docker network,
    # so the browser sees one origin (no CORS) — the realistic SPA-behind-proxy shape.
    location /v1/ {
        proxy_pass http://app:8083;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
    }
    location = /health {
        proxy_pass http://app:8083;
    }

    # SPA: serve static assets, falling back to index.html for client-side routes.
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
