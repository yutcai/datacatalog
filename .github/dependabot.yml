# Dependabot keeps dependencies current by opening PRs that CI then verifies.
# Policy: auto-propose minor/patch only (grouped to reduce noise); major bumps
# are ignored here and handled manually after reading their release notes — a
# major can carry breaking changes, so a human reviews those. Security updates
# are a separate mechanism, enabled in the repo's Settings (not configured here).
version: 2
updates:
  # CI workflow actions (e.g. actions/checkout) — the manifest is .github/workflows/*
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Backend (Spring Boot etc.) — build.gradle at the repo root
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      gradle:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # React UI — ui/package.json
  - package-ecosystem: "npm"
    directory: "/ui"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      ui-npm:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Playwright browser E2E — e2e/package.json
  - package-ecosystem: "npm"
    directory: "/e2e"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      e2e-npm:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
