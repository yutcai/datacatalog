name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v5

      - name: Build and test
        run: ./gradlew build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Start the full stack
        run: docker compose up -d --build

      - name: Wait for the UI (nginx serves the SPA and proxies the API)
        run: |
          for i in $(seq 1 60); do
            if curl -sf localhost:3000/health >/dev/null; then echo "ready"; exit 0; fi
            sleep 3
          done
          echo "stack did not become ready"; docker compose logs; exit 1

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Playwright + browser
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright
        working-directory: e2e
        run: npx playwright test
        env:
          BASE_URL: http://localhost:3000

      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7
