services:
  app:
    build: .
    ports:
      - "8083:8083"
    environment:
      DB_HOST: postgres
      DB_PASSWORD: ${DB_PASSWORD:-datacatalog}
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: datacatalog
      POSTGRES_USER: datacatalog
      POSTGRES_PASSWORD: ${DB_PASSWORD:-datacatalog}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datacatalog"]
      interval: 5s
      timeout: 3s
      retries: 10

  localstack:
    image: localstack/localstack:3
    environment:
      SERVICES: s3
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf localhost:4566/_localstack/health | grep -q '\"s3\"'"]
      interval: 5s
      timeout: 3s
      retries: 10
