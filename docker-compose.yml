services:
  app:
    build: .
    ports:
      - "8083:8083"
    environment:
      DB_HOST: postgres
      DB_PASSWORD: ${DB_PASSWORD:-datacatalog}
      S3_BUCKET: datacatalog
      # the app reaches LocalStack over the docker network…
      S3_ENDPOINT: http://localstack:4566
      # …but pre-signed URLs must point at a host the client (your browser) can reach
      S3_PUBLIC_ENDPOINT: http://localhost:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy

  postgres:
    # Postgres 16 + the pgvector extension (semantic search); same image as the test containers.
    # Switching from postgres:16-alpine: an existing pgdata volume was initialized under musl
    # locales, so reset it once with `docker compose down -v`.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: datacatalog
      POSTGRES_USER: datacatalog
      POSTGRES_PASSWORD: ${DB_PASSWORD:-datacatalog}
    ports:
      - "5432:5432"
    volumes:
      # named volume so catalog data survives `docker compose down`
      # (wipe it with `docker compose down -v` for a clean slate)
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datacatalog"]
      interval: 5s
      timeout: 3s
      retries: 10

  localstack:
    image: localstack/localstack:3
    environment:
      SERVICES: s3
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf localhost:4566/_localstack/health | grep -q '\"s3\"'"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Thin React UI served by nginx, which also reverse-proxies /v1 and /health to the app
  # so the browser hits a single origin. Open http://localhost:3000.
  ui:
    build: ./ui
    ports:
      - "3000:80"
    depends_on:
      - app

volumes:
  pgdata:
